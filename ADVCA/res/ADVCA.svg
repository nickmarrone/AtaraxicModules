<?xml version="1.0" encoding="utf-8"?>
<svg width="60.96" height="381" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="60.96" height="381" fill="#e0e0e0"/>
  
  <!-- Output Background Squares -->
  <rect x="30" y="190" width="28" height="40" fill="#222222" rx="3"/>
  <rect x="30" y="315" width="28" height="40" fill="#222222" rx="3"/>

  <!-- Labels -->
  <g font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#222222">
    <!-- Title -->
    <text x="30.48" y="25" font-size="10">ADVCA</text>
    
    <!-- Switch Labels -->
    <text x="30.48" y="36" font-size="7">AR</text>
    <text x="30.48" y="70" font-size="7">AD</text>

    <!-- Knob Labels -->
    <text x="30.48" y="85">ATTACK</text>
    <text x="30.48" y="140">DECAY</text>

    <!-- Envelope Inputs -->
    <text x="16" y="199" font-size="7">GATE</text>

    <!-- CV Section -->
    <text x="16" y="281" font-size="7">CV</text>
    <text x="44" y="281" font-size="7">AMT</text>

    <!-- VCA Inputs -->
    <text x="16" y="324" font-size="7">IN</text>
  </g>

  <!-- Output Labels (White Text) -->
  <g font-family="sans-serif" font-size="7" font-weight="bold" text-anchor="middle" fill="#ffffff">
    <text x="44" y="199">ENV</text>
    <text x="44" y="324">OUT</text>
  </g>

  <!-- Response Symbols -->
  <g fill="none" stroke="#222222" stroke-width="1.5" stroke-linecap="round">
    <path d="M 14 258 L 20 252" />
    <path d="M 40 258 Q 45 258 46 252" />
  </g>
</svg>
